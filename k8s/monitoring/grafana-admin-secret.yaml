# k8s/monitoring/grafana-admin-secret.yaml
# Secret consumed by kube-prometheus-stack Grafana values:
# grafana.admin.existingSecret: grafana-admin-credentials
# userKey: admin-user
# passwordKey: admin-password
apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin-credentials
  namespace: monitoring
type: Opaque
stringData:
  admin-user: admin
  admin-password: CHANGE_ME_STRONG_PASSWORD
