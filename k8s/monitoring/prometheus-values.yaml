# k8s/monitoring/prometheus-values.yaml

grafana:
  enabled: true
  admin:
    existingSecret: grafana-admin-credentials
    userKey: admin-user
    passwordKey: admin-password

  replicas: 1
  deploymentStrategy:
    type: Recreate
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "false"
    hosts:
      - ""    # Use ingress IP directly
    path: /grafana
    pathType: Prefix
  grafana.ini:
    server:
      root_url: "%(protocol)s://%(domain)s/grafana/"
      serve_from_sub_path: true
  persistence:
    enabled: true
    storageClassName: managed-csi
    size: 5Gi
  # Grafana can take longer on first boot (DB migrations + dashboard provisioning).
  # More tolerant probes prevent restart loops on small AKS nodes.
  readinessProbe:
    initialDelaySeconds: 30
    timeoutSeconds: 5
    periodSeconds: 10
    failureThreshold: 12
  livenessProbe:
    initialDelaySeconds: 180
    timeoutSeconds: 10
    periodSeconds: 10
    failureThreshold: 12

prometheus:
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "false"
    hosts:
      - ""
    paths:
      - /prometheus
    pathType: Prefix
  prometheusSpec:
    # Needed when exposing Prometheus on a sub-path via ingress.
    routePrefix: /prometheus
    # Scrape interval
    scrapeInterval: 30s
    # Scrape OTel Collector agent metrics from otel-demo namespace.
    # We match pod labels and the "metrics" port name instead of relying
    # on prometheus.io/scrape annotations.
    additionalScrapeConfigs:
      - job_name: otel-collector
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - otel-demo
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name, __meta_kubernetes_pod_label_component]
            action: keep
            regex: opentelemetry-collector;agent-collector
          - source_labels: [__meta_kubernetes_pod_container_port_name]
            action: keep
            regex: metrics
    # PersistentVolumeClaim for metric retention
    retention: 7d
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: managed-csi
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi

prometheusOperator:
  admissionWebhooks:
    patch:
      enabled: true

alertmanager:
  enabled: true

# AKS nodes in this cluster do not all carry the 'type' label used by the chart's
# default affinity rule, which can leave one DaemonSet pod Pending forever.
nodeExporter:
  enabled: true

prometheus-node-exporter:
  enabled: true
