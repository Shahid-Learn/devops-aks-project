apiVersion: v1
kind: LimitRange
metadata:
  name: default-container-resources
  namespace: otel-demo
spec:
  limits:
  - type: Container
    defaultRequest:
      cpu: 50m
      memory: 64Mi
    default:
      cpu: 500m
      memory: 512Mi
    max:
      cpu: 500m
      memory: 512Mi